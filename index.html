<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi Intercontrat — 5 Degrés</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb}
    input,select,textarea{font-family:inherit}
    .spin{animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)!important;transform:translateY(-1px)}
    .card{transition:box-shadow .2s,transform .2s}
  </style>
</head>
<body>
  <div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#6b7280;font-family:sans-serif">Chargement…</div></div>

<script type="module">
import { useState, useEffect, useCallback, createElement as h } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

const URL_ = "https://teonxryxddjsfetwxgik.supabase.co";
const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlb254cnl4ZGRqc2ZldHd4Z2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODkzNDQsImV4cCI6MjA5NzE2NTM0NH0.NC5UJ0NZDiilgmSFhHSr1psdLRCwZL7NKloGGEF0SXc";
const HDR  = {"Content-Type":"application/json","apikey":KEY,"Authorization":"Bearer "+KEY,"Prefer":"return=representation"};

const sb = async (method, path, body) => {
  const r = await fetch(URL_+"/rest/v1/"+path, {
    method,
    headers: method==="DELETE" ? {...HDR,"Prefer":"return=minimal"} : HDR,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(method+" → "+r.status+": "+await r.text());
  if (method==="DELETE" || r.status===204) return null;
  const d = await r.json();
  return Array.isArray(d) ? (d[0] || null) : d;
};

const BMS = ["Sébastien","Lucile","Arnaud","Paul","Louise"];
const COLS = [
  {id:"todo",      label:"À faire",  bc:"#cbd5e1",hbg:"#f1f5f9",htc:"#475569"},
  {id:"contacted", label:"Contacté", bc:"#93c5fd",hbg:"#dbeafe",htc:"#1d4ed8"},
  {id:"followup",  label:"Relancé",  bc:"#fdba74",hbg:"#ffedd5",htc:"#c2410c"},
  {id:"done",      label:"Done ✓",   bc:"#86efac",hbg:"#dcfce7",htc:"#15803d"},
];
const CC = [
  {bg:"#e0e7ff",tc:"#3730a3",bc:"#a5b4fc",dot:"#6366f1"},
  {bg:"#fce7f3",tc:"#9d174d",bc:"#f9a8d4",dot:"#ec4899"},
  {bg:"#d1fae5",tc:"#065f46",bc:"#6ee7b7",dot:"#10b981"},
  {bg:"#ffedd5",tc:"#9a3412",bc:"#fdba74",dot:"#f97316"},
  {bg:"#ede9fe",tc:"#5b21b6",bc:"#c4b5fd",dot:"#8b5cf6"},
  {bg:"#cffafe",tc:"#164e63",bc:"#67e8f9",dot:"#06b6d4"},
  {bg:"#ffe4e6",tc:"#9f1239",bc:"#fda4af",dot:"#f43f5e"},
];
const PRI = {high:{l:"Haute",c:"#ef4444"},medium:{l:"Moyenne",c:"#f97316"},low:{l:"Faible",c:"#3b82f6"}};
const ORD = ["todo","contacted","followup","done"];
const uid  = () => crypto.randomUUID();
const td   = () => new Date().toISOString().split("T")[0];
const fmtD = s => new Date(s+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
const dys  = s => { const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((new Date(s+"T00:00:00")-t)/86400000); };
const fmtH = d => d.toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const getCC= (collabs,id) => { const i=collabs.findIndex(c=>c.id===id); return CC[Math.max(i,0)%CC.length]; };
const inp  = {width:"100%",borderRadius:8,border:"1px solid #d1d5db",padding:"8px 10px",fontSize:13,outline:"none"};
const lbl  = {fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.5,display:"block",marginBottom:4};
const mkBtn= (bg,tc,extra) => ({display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,background:bg,color:tc,border:"none",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:600,cursor:"pointer",...(extra||{})});

function App() {
  const [collabs,  setCollabs]  = useState([]);
  const [cards,    setCards]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [error,    setError]    = useState(null);
  const [selC,     setSelC]     = useState("all");
  const [selBM,    setSelBM]    = useState("all");
  const [dragId,   setDragId]   = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [showC,    setShowC]    = useState(false);
  const [showK,    setShowK]    = useState(false);
  const [editC,    setEditC]    = useState(null);
  const [editK,    setEditK]    = useState(null);
  const EC = {name:"",role:"",available_from:td(),bm:BMS[0]};
  const EK = {company:"",contact:"",bm:BMS[0],collaborator_ids:[],status:"todo",note:"",priority:"medium"};
  const [cf, setCf] = useState(EC);
  const [kf, setKf] = useState(EK);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try {
      const [cr,tr] = await Promise.all([
        fetch(URL_+"/rest/v1/collaborators?select=*&order=available_from.asc",{headers:HDR}).then(r=>r.json()),
        fetch(URL_+"/rest/v1/tickets?select=*,ticket_collaborators(collaborator_id)&order=created_at.asc",{headers:HDR}).then(r=>r.json()),
      ]);
      setCollabs(cr);
      setCards(tr.map(t=>({...t,collaborator_ids:(t.ticket_collaborators||[]).map(x=>x.collaborator_id)})));
    } catch(e){ setError("Erreur chargement : "+e.message); }
    finally{ setLoading(false); }
  },[]);
  useEffect(()=>{ load(); },[load]);

  const filt  = cards.filter(c=>selC==="all"||c.collaborator_ids.includes(selC)).filter(c=>selBM==="all"||c.bm===selBM);
  const colC  = s => filt.filter(c=>c.status===s);
  const sorted= [...collabs].sort((a,b)=>new Date(a.available_from)-new Date(b.available_from));

  const onDrop = async(e,col)=>{
    e.preventDefault(); if(!dragId)return;
    const t=td();
    setCards(p=>p.map(c=>c.id===dragId?{...c,status:col,updated_at:t}:c));
    setDragId(null); setDragOver(null);
    try{ await sb("PATCH","tickets?id=eq."+dragId,{status:col,updated_at:t}); }
    catch(e){ setError(e.message); }
  };
  const move = async(id,dir)=>{
    const card=cards.find(c=>c.id===id); if(!card)return;
    const i=ORD.indexOf(card.status);
    const ns=ORD[dir==="right"?Math.min(i+1,3):Math.max(i-1,0)];
    const t=td();
    setCards(p=>p.map(c=>c.id===id?{...c,status:ns,updated_at:t}:c));
    try{ await sb("PATCH","tickets?id=eq."+id,{status:ns,updated_at:t}); }
    catch(e){ setError(e.message); }
  };
  const syncJ = async(tid,cids)=>{
    await fetch(URL_+"/rest/v1/ticket_collaborators?ticket_id=eq."+tid,{method:"DELETE",headers:{...HDR,"Prefer":"return=minimal"}});
    if(cids.length) await fetch(URL_+"/rest/v1/ticket_collaborators",{method:"POST",headers:HDR,body:JSON.stringify(cids.map(cid=>({ticket_id:tid,collaborator_id:cid})))});
  };
  const saveCollab = async()=>{
    if(!(cf.name||"").trim())return; setSaving(true);
    try{
      if(editC){ await sb("PATCH","collaborators?id=eq."+editC.id,cf); setCollabs(p=>p.map(c=>c.id===editC.id?{...c,...cf}:c)); }
      else{ const row={id:uid(),name:cf.name,role:cf.role||"",available_from:cf.available_from||td(),bm:cf.bm||BMS[0]}; await sb("POST","collaborators",row); setCollabs(p=>[...p,row].sort((a,b)=>new Date(a.available_from)-new Date(b.available_from))); }
      setShowC(false); setEditC(null); setCf({...EC});
    }catch(e){ setError(e.message); }finally{ setSaving(false); }
  };
  const delCollab = async id=>{
    setSaving(true);
    try{ await sb("DELETE","collaborators?id=eq."+id); setCollabs(p=>p.filter(c=>c.id!==id)); setShowC(false); setEditC(null); }
    catch(e){ setError(e.message); }finally{ setSaving(false); }
  };
  const saveCard = async()=>{
    if(!(kf.company||"").trim())return; setSaving(true);
    try{
      const cids=kf.collaborator_ids||[]; const rest={...kf}; delete rest.collaborator_ids;
      if(editK){ const patch={...rest,updated_at:td()}; await sb("PATCH","tickets?id=eq."+editK.id,patch); await syncJ(editK.id,cids); setCards(p=>p.map(c=>c.id===editK.id?{...c,...patch,collaborator_ids:cids}:c)); }
      else{ const nid=uid(); const row={id:nid,company:rest.company,contact:rest.contact||"",bm:rest.bm||BMS[0],status:rest.status||"todo",note:rest.note||"",priority:rest.priority||"medium",created_at:td(),updated_at:td()}; await sb("POST","tickets",row); await syncJ(nid,cids); setCards(p=>[...p,{...row,collaborator_ids:cids}]); }
      setShowK(false); setEditK(null); setKf({...EK});
    }catch(e){ setError(e.message); }finally{ setSaving(false); }
  };
  const delCard = async id=>{
    setSaving(true);
    try{ await syncJ(id,[]); await sb("DELETE","tickets?id=eq."+id); setCards(p=>p.filter(c=>c.id!==id)); setShowK(false); setEditK(null); }
    catch(e){ setError(e.message); }finally{ setSaving(false); }
  };

  if(loading) return html`<div style=${{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#6b7280"}}><div class="spin" style=${{fontSize:28}}>⏳</div><span style=${{fontSize:14}}>Chargement…</span></div>`;

  return html`<div style=${{minHeight:"100vh"}}>

    <div style=${{background:"#4338ca",padding:"14px 20px"}}>
      <div style=${{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style=${{color:"white",margin:0,fontSize:19,fontWeight:700}}>💼 Suivi Intercontrat — 5 Degrés</h1>
          <p style=${{color:"#c7d2fe",margin:"3px 0 0",fontSize:12,textTransform:"capitalize"}}>${fmtH(new Date())}</p>
        </div>
        <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          ${saving && html`<span class="spin" style=${{fontSize:14}}>⏳</span>`}
          <button style=${mkBtn("white","#4338ca")} onClick=${()=>{setCf({...EC});setEditC(null);setShowC(true);}}>+ Collaborateur</button>
          <button style=${mkBtn("white","#4338ca")} onClick=${()=>{setKf({...EK});setEditK(null);setShowK(true);}}>+ Ticket</button>
        </div>
      </div>
    </div>

    ${error && html`<div style=${{maxWidth:1280,margin:"10px auto 0",padding:"0 20px"}}><div style=${{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style=${{fontSize:13,color:"#dc2626"}}>${error}</span><button onClick=${()=>setError(null)} style=${{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#f87171",lineHeight:1}}>×</button></div></div>`}

    <div style=${{maxWidth:1280,margin:"0 auto",padding:"18px 20px",display:"flex",flexDirection:"column",gap:18}}>

      <div>
        <p style=${{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1,margin:"0 0 10px"}}>👥 Collaborateurs bientôt disponibles</p>
        <div style=${{display:"flex",flexWrap:"wrap",gap:8}}>
          <button onClick=${()=>setSelC("all")} style=${{padding:"7px 14px",borderRadius:12,border:"2px solid "+(selC==="all"?"#4338ca":"#e5e7eb"),background:selC==="all"?"#4338ca":"white",color:selC==="all"?"white":"#6b7280",fontSize:13,fontWeight:600,cursor:"pointer"}}>Tous (${cards.length})</button>
          ${sorted.map(col=>{
            const c=getCC(collabs,col.id); const d=dys(col.available_from); const sel=selC===col.id;
            const cnt=cards.filter(x=>x.collaborator_ids.includes(col.id)).length;
            const dt=d<=0?"Dispo !":d<=14?"J-"+d:fmtD(col.available_from);
            const dc=d<=0?"#dc2626":d<=7?"#ef4444":d<=14?"#f97316":"#9ca3af";
            return html`<div key=${col.id} style=${{position:"relative"}}>
              <button onClick=${()=>setSelC(sel?"all":col.id)} style=${{display:"flex",alignItems:"center",gap:8,padding:"7px 10px 7px 14px",borderRadius:12,border:"2px solid "+(sel?c.bc:"#e5e7eb"),background:sel?c.bg:"white",cursor:"pointer",outline:sel?"2px solid "+c.dot:"none",outlineOffset:2}}>
                <span style=${{width:8,height:8,borderRadius:"50%",background:c.dot,flexShrink:0}}></span>
                <div style=${{textAlign:"left"}}>
                  <div style=${{fontSize:13,fontWeight:600,color:sel?c.tc:"#1f2937",lineHeight:1.3}}>${col.name}</div>
                  <div style=${{fontSize:11,color:sel?c.tc:"#9ca3af",lineHeight:1.3}}>${col.role}</div>
                </div>
                <div style=${{display:"flex",flexDirection:"column",alignItems:"flex-end",marginLeft:4}}>
                  <span style=${{fontSize:11,color:sel?c.tc:dc,fontWeight:600,lineHeight:1.3}}>${dt}</span>
                  <span style=${{fontSize:11,color:sel?c.tc:"#9ca3af",lineHeight:1.3}}>${cnt} ticket${cnt!==1?"s":""}</span>
                </div>
              </button>
              <button onClick=${()=>{setCf({...col});setEditC(col);setShowC(true);}} style=${{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#4338ca",color:"white",border:"none",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✏</button>
            </div>`;
          })}
        </div>
      </div>

      <div style=${{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
        <span style=${{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1}}>BM :</span>
        <button onClick=${()=>setSelBM("all")} style=${{padding:"5px 12px",borderRadius:8,border:"2px solid "+(selBM==="all"?"#4338ca":"#e5e7eb"),background:selBM==="all"?"#4338ca":"white",color:selBM==="all"?"white":"#6b7280",fontSize:12,fontWeight:600,cursor:"pointer"}}>Tous</button>
        ${BMS.map(bm=>{
          const cnt=cards.filter(c=>c.bm===bm&&(selC==="all"||c.collaborator_ids.includes(selC))).length;
          return html`<button key=${bm} onClick=${()=>setSelBM(selBM===bm?"all":bm)} style=${{padding:"5px 12px",borderRadius:8,border:"2px solid "+(selBM===bm?"#4338ca":"#e5e7eb"),background:selBM===bm?"#4338ca":"white",color:selBM===bm?"white":"#6b7280",fontSize:12,fontWeight:600,cursor:"pointer"}}>${bm} (${cnt})</button>`;
        })}
      </div>

      <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        ${COLS.map(col=>{
          const cc2=colC(col.id); const isOver=dragOver===col.id;
          return html`<div key=${col.id}
            onDragOver=${e=>{e.preventDefault();setDragOver(col.id);}}
            onDrop=${e=>onDrop(e,col.id)}
            onDragLeave=${()=>setDragOver(null)}
            style=${{borderRadius:12,border:"2px solid "+(isOver?"#6366f1":col.bc),background:isOver?"#eef2ff":"#f8fafc",minHeight:420,display:"flex",flexDirection:"column",transition:"border-color .2s"}}>
            <div style=${{padding:"9px 14px",borderRadius:"10px 10px 0 0",background:col.hbg,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style=${{fontWeight:700,fontSize:13,color:col.htc}}>${col.label}</span>
              <span style=${{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:12,background:"rgba(255,255,255,.7)",color:col.htc}}>${cc2.length}</span>
            </div>
            <div style=${{padding:8,flex:1,display:"flex",flexDirection:"column",gap:8}}>
              ${cc2.map(card=>{
                const isDrag=dragId===card.id; const ci=ORD.indexOf(card.status);
                return html`<div key=${card.id} class="card" draggable=${true}
                  onDragStart=${e=>{setDragId(card.id);e.dataTransfer.effectAllowed="move";}}
                  onDragEnd=${()=>{setDragId(null);setDragOver(null);}}
                  style=${{background:"white",borderRadius:12,border:"1px solid #e5e7eb",padding:12,cursor:"grab",opacity:isDrag?0.3:1,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
                  <div style=${{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4}}>
                    <span style=${{fontWeight:600,fontSize:13,color:"#1f2937",lineHeight:1.4}}>${card.company}</span>
                    <div style=${{display:"flex",gap:1,flexShrink:0}}>
                      ${ci>0&&html`<button onClick=${()=>move(card.id,"left")} style=${{padding:"1px 4px",background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:18,lineHeight:1}}>‹</button>`}
                      ${ci<3&&html`<button onClick=${()=>move(card.id,"right")} style=${{padding:"1px 4px",background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:18,lineHeight:1}}>›</button>`}
                      <button onClick=${()=>{setKf({...card});setEditK(card);setShowK(true);}} style=${{padding:"1px 4px",background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:12}}>✏</button>
                      <button onClick=${()=>delCard(card.id)} style=${{padding:"1px 4px",background:"none",border:"none",cursor:"pointer",color:"#9ca3af",fontSize:18,lineHeight:1}}>×</button>
                    </div>
                  </div>
                  ${card.contact&&html`<div style=${{fontSize:12,color:"#9ca3af",marginTop:4}}>${card.contact}</div>`}
                  ${card.note&&html`<div style=${{fontSize:12,color:"#6b7280",fontStyle:"italic",marginTop:4,paddingLeft:8,borderLeft:"2px solid #a5b4fc",lineHeight:1.4}}>${card.note}</div>`}
                  <div style=${{marginTop:8}}>
                    <div style=${{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>
                      ${card.collaborator_ids.length
                        ? card.collaborator_ids.map(cid=>{ const co=collabs.find(c=>c.id===cid); if(!co)return null; const ccc=getCC(collabs,co.id); return html`<span key=${cid} style=${{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 8px",borderRadius:12,border:"1px solid "+ccc.bc,background:ccc.bg,color:ccc.tc,fontWeight:600}}>👤 ${co.name.split(" ")[0]}</span>`; })
                        : html`<span style=${{fontSize:11,color:"#9ca3af",fontStyle:"italic"}}>Non assigné</span>`}
                    </div>
                    <div style=${{display:"flex",gap:8,alignItems:"center"}}>
                      <span style=${{fontSize:11,fontWeight:600,color:(PRI[card.priority]||PRI.medium).c}}>● ${(PRI[card.priority]||PRI.medium).l}</span>
                      <span style=${{fontSize:11,color:"#9ca3af"}}>${card.bm}</span>
                    </div>
                  </div>
                </div>`;
              })}
              ${isOver&&html`<div style=${{border:"2px dashed #6366f1",borderRadius:12,padding:20,textAlign:"center",fontSize:12,color:"#6366f1",fontWeight:600}}>Déposer ici</div>`}
              ${cc2.length===0&&!isOver&&html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 0",fontSize:12,color:"#d1d5db"}}>Aucun ticket</div>`}
            </div>
          </div>`;
        })}
      </div>
    </div>

    ${showC&&html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:50}}>
      <div style=${{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style=${{margin:0,fontSize:17,fontWeight:700}}>👤 ${editC?"Modifier":"Nouveau collaborateur"}</h3>
          <button onClick=${()=>{setShowC(false);setEditC(null);}} style=${{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",lineHeight:1}}>×</button>
        </div>
        <div style=${{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style=${lbl}>Nom complet *</label><input style=${inp} placeholder="Prénom Nom" value=${cf.name||""} onInput=${e=>setCf(p=>({...p,name:e.target.value}))}/></div>
          <div><label style=${lbl}>Rôle / Compétences</label><input style=${inp} placeholder="ex: Développeur React…" value=${cf.role||""} onInput=${e=>setCf(p=>({...p,role:e.target.value}))}/></div>
          <div><label style=${lbl}>Disponible le</label><input type="date" style=${inp} value=${cf.available_from||td()} onInput=${e=>setCf(p=>({...p,available_from:e.target.value}))}/></div>
          <div><label style=${lbl}>BM responsable</label><select style=${inp} value=${cf.bm||BMS[0]} onChange=${e=>setCf(p=>({...p,bm:e.target.value}))}>${BMS.map(b=>html`<option key=${b} value=${b}>${b}</option>`)}</select></div>
        </div>
        <div style=${{display:"flex",gap:8,marginTop:16}}>
          <button onClick=${saveCollab} disabled=${saving} style=${mkBtn("#4338ca","white",{flex:1,opacity:saving?.7:1})}>${saving?"⏳ …":"💾 Enregistrer"}</button>
          ${editC&&html`<button onClick=${()=>delCollab(editC.id)} disabled=${saving} style=${mkBtn("#dc2626","white")}>🗑</button>`}
          <button onClick=${()=>{setShowC(false);setEditC(null);}} style=${mkBtn("white","#374151",{border:"1px solid #d1d5db"})}>Annuler</button>
        </div>
      </div>
    </div>`}

    ${showK&&html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:50}}>
      <div style=${{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,.25)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style=${{margin:0,fontSize:17,fontWeight:700}}>💼 ${editK?"Modifier le ticket":"Nouveau ticket"}</h3>
          <button onClick=${()=>{setShowK(false);setEditK(null);}} style=${{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",lineHeight:1}}>×</button>
        </div>
        <div style=${{display:"flex",flexDirection:"column",gap:12}}>
          <div><label style=${lbl}>Entreprise *</label><input style=${inp} placeholder="Nom de l'entreprise" value=${kf.company||""} onInput=${e=>setKf(p=>({...p,company:e.target.value}))}/></div>
          <div><label style=${lbl}>Contact</label><input style=${inp} placeholder="Nom du contact" value=${kf.contact||""} onInput=${e=>setKf(p=>({...p,contact:e.target.value}))}/></div>
          <div>
            <label style=${lbl}>Collaborateurs concernés</label>
            <div style=${{border:"1px solid #e5e7eb",borderRadius:8,overflow:"hidden"}}>
              ${collabs.length===0
                ? html`<div style=${{padding:"10px 12px",fontSize:12,color:"#9ca3af",fontStyle:"italic"}}>Aucun collaborateur — ajoutez-en d'abord</div>`
                : collabs.map(c=>{ const ids=kf.collaborator_ids||[]; const checked=ids.includes(c.id); const ccc=getCC(collabs,c.id); return html`<label key=${c.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",cursor:"pointer",background:checked?ccc.bg:"white",borderBottom:"1px solid #f3f4f6"}}>
                  <input type="checkbox" checked=${checked} onChange=${()=>setKf(p=>({...p,collaborator_ids:checked?ids.filter(i=>i!==c.id):[...ids,c.id]}))}/>
                  <span style=${{width:8,height:8,borderRadius:"50%",background:ccc.dot,flexShrink:0}}></span>
                  <div style=${{flex:1}}><div style=${{fontSize:13,fontWeight:600,color:checked?ccc.tc:"#1f2937"}}>${c.name}</div><div style=${{fontSize:11,color:"#9ca3af"}}>${c.role}</div></div>
                  ${checked&&html`<span style=${{fontSize:12,fontWeight:700,color:ccc.tc}}>✓</span>`}
                </label>`; })}
            </div>
          </div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style=${lbl}>BM</label><select style=${inp} value=${kf.bm||BMS[0]} onChange=${e=>setKf(p=>({...p,bm:e.target.value}))}>${BMS.map(b=>html`<option key=${b} value=${b}>${b}</option>`)}</select></div>
            <div><label style=${lbl}>Priorité</label><select style=${inp} value=${kf.priority||"medium"} onChange=${e=>setKf(p=>({...p,priority:e.target.value}))}><option value="high">Haute</option><option value="medium">Moyenne</option><option value="low">Faible</option></select></div>
          </div>
          <div><label style=${lbl}>Colonne</label><select style=${inp} value=${kf.status||"todo"} onChange=${e=>setKf(p=>({...p,status:e.target.value}))}>${COLS.map(c=>html`<option key=${c.id} value=${c.id}>${c.label}</option>`)}</select></div>
          <div><label style=${lbl}>Note</label><textarea style=${{...inp,resize:"vertical"}} rows="2" placeholder="Contexte, remarques…" value=${kf.note||""} onInput=${e=>setKf(p=>({...p,note:e.target.value}))}></textarea></div>
        </div>
        <div style=${{display:"flex",gap:8,marginTop:16}}>
          <button onClick=${saveCard} disabled=${saving} style=${mkBtn("#4338ca","white",{flex:1,opacity:saving?.7:1})}>${saving?"⏳ …":"💾 Enregistrer"}</button>
          ${editK&&html`<button onClick=${()=>delCard(editK.id)} disabled=${saving} style=${mkBtn("#dc2626","white")}>🗑</button>`}
          <button onClick=${()=>{setShowK(false);setEditK(null);}} style=${mkBtn("white","#374151",{border:"1px solid #d1d5db"})}>Annuler</button>
        </div>
      </div>
    </div>`}

  </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
